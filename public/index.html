<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>National Sports Connect</title>

  <!-- Default rich link preview (Open Graph + Twitter Card). These are the
       fallback tags shown when a non-storefront link (coach portal, catalog,
       etc.) is shared in iMessage / Slack / Facebook. Per-store pages under
       /shop/<slug> get these REPLACED at request time with the store's own
       name + banner/logo by netlify/edge-functions/og-storefront.js — link
       preview bots don't run JS, so the tags must be in the served HTML. -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="National Sports Apparel" />
  <meta property="og:title" content="National Sports Apparel" />
  <meta property="og:description" content="Custom team apparel, spirit wear, and coach team stores — designed, decorated, and delivered." />
  <meta property="og:image" content="https://nsa-portal.netlify.app/NEW%20NSA%20Logo%20on%20white.png" />
  <meta property="og:url" content="https://nationalsportsapparel.com" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="National Sports Apparel" />
  <meta name="twitter:description" content="Custom team apparel, spirit wear, and coach team stores — designed, decorated, and delivered." />
  <meta name="twitter:image" content="https://nsa-portal.netlify.app/NEW%20NSA%20Logo%20on%20white.png" />

  <!-- Athletic/jersey webfonts for the Uniform Builder (src/uniform/fonts.js).
       Loaded here so both the on-screen SVG editor and the Canvas production
       export share the same faces. display=swap keeps the app painting while
       fonts fetch. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Saira+Condensed:wght@700&family=Oswald:wght@600&family=Graduate&family=Squada+One&family=Rye&family=Pirata+One&family=Pacifico&family=Baloo+2:wght@800&display=swap" rel="stylesheet" />

  <link rel="icon" href="%PUBLIC_URL%/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="%PUBLIC_URL%/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
  <script>
    (function(){
      var k='%REACT_APP_GOOGLE_PLACES_API_KEY%';
      if(k&&k.indexOf('REACT_APP_')===-1){
        var s=document.createElement('script');
        s.src='https://maps.googleapis.com/maps/api/js?key='+k+'&libraries=places';
        s.async=true;s.defer=true;document.head.appendChild(s);
      }
    })();
  </script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
