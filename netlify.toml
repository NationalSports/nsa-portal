[build]
  command = "GENERATE_SOURCEMAP=true npm run build"
  publish = "build"
  environment = { NODE_VERSION = "18" }

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# S&S Activewear pricing sync — daily at 5:00 AM CT (11:00 UTC)
[functions."ss-pricing-sync"]
  schedule = "0 11 * * *"
