[build]
  command = "GENERATE_SOURCEMAP=true npm run build"
  publish = "build"
  environment = { NODE_VERSION = "18" }

# index.html must never be cached, so a reload after a deploy always fetches the
# current asset manifest (chunk hashes) instead of re-requesting dead chunks.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Hashed build assets are content-addressed and safe to cache forever.
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[functions]
  directory = "netlify/functions"

[functions."vectorizer-proxy"]
  timeout = 26

[functions."pdf-generator"]
  timeout = 26

# S&S Activewear pricing sync — daily at 5:00 AM CT (11:00 UTC)
[functions."ss-pricing-sync"]
  schedule = "0 11 * * *"

# System Health alert — every 2 hours, emails Steve if orphan jobs detected
[functions."so-health-alert"]
  schedule = "0 */2 * * *"

# UPS pickup auto-check — daily at 13:00 UTC (~5-6 AM PT). Marks shipments as
# picked up in Supabase once UPS has scanned the package, so Awaiting Pickup
# clears itself even when nobody has the portal open.
[functions."ups-pickup-sync"]
  schedule = "0 13 * * *"
